name: Approve Deployment via GitHub App

on:
  repository_dispatch:
    types: [approve-deployment]

jobs:
  approve:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ GitHub App Token generate karna (Sabse zaroori step)
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          # Yahan Repo1 ka owner aayega
          owner: "RajaNimit27"

      # 2️⃣ Run ID check karna aur loop mein pending status ka wait karna
      - name: Fetch Pending Environments
        id: fetch_pending
        run: |
          RUN_ID=${{ github.event.client_payload.run_id }}
          TOKEN=${{ steps.app-token.outputs.token }}
          REPO="RajaNimit27/testGithubAppDeploymentRepo1"

          echo "Checking pending deployments for Run ID: $RUN_ID"
          
          # 15 attempts (2.5 mins max) tak wait karenge
          for i in {1..15}; do
            RESPONSE=$(curl -s -L \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/pending_deployments")
            
            # Agar response array hai aur empty nahi hai
            if echo "$RESPONSE" | jq -e 'type == "array" and length > 0' > /dev/null; then
              ENV_IDS=$(echo "$RESPONSE" | jq -c '[.[].environment.id]')
              echo "env_ids=$ENV_IDS" >> $GITHUB_OUTPUT
              echo "Found pending environment IDs: $ENV_IDS ✅"
              exit 0
            fi

            echo "Attempt $i: Pending deployment abhi tak reflect nahi hui... ⏳"
            sleep 10
          done

          echo "❌ Error: No pending deployments found for Run ID $RUN_ID"
          exit 1

      # 3️⃣ Deployment Approve karna
      - name: Send Approval
        if: steps.fetch_pending.outputs.env_ids != ''
        run: |
          RUN_ID=${{ github.event.client_payload.run_id }}
          TOKEN=${{ steps.app-token.outputs.token }}
          REPO="RajaNimit27/testGithubAppDeploymentRepo1"
          ENV_IDS='${{ steps.fetch_pending.outputs.env_ids }}'

          echo "Approving Run ID $RUN_ID for environments $ENV_IDS..."

          curl -L -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/pending_deployments" \
            -d "{
              \"environment_ids\": $ENV_IDS,
              \"state\": \"approved\",
              \"comment\": \"Approved by Custom App Gate 🚀\"
            }"