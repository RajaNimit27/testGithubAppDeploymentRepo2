name: Approve/Reject Deployment via Code Logic

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Repo 1 ki Run ID'
        required: true

jobs:
  gatekeeper-logic:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ GitHub App Token generate karna
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: RajaNimit27

      # 2️⃣ Pending Environments fetch karna aur Code se decide karna
      - name: Evaluate and Process Environments
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          TOKEN="${{ steps.app-token.outputs.token }}"
          REPO="RajaNimit27/testGithubAppDeploymentRepo1"

          echo "Fetching pending environments for Run ID: $RUN_ID"

          # 1. Pending list nikaalo
          RESPONSE=$(curl -s -L \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/pending_deployments")

          # Check agar koi pending deployment hai ya nahi
          if ! echo "$RESPONSE" | jq -e 'type == "array" and length > 0' > /dev/null; then
            echo "❌ No pending deployments found."
            exit 1
          fi

          # 2. Loop through each pending environment
          for env_name in $(echo "$RESPONSE" | jq -r '.[].environment.name'); do
            
            # --- YAHAN AAPNA LOGIC LIKHO ---
            STATE="rejected" # Default state
            COMMENT="Rejected by Repo 2 Automated Logic"

            if [ "$env_name" == "staging" ]; then
                STATE="approved"
                COMMENT="Staging pass ho gaya ✅"
            elif [ "$env_name" == "uat" ]; then
                STATE="approved"
                COMMENT="UAT fail ho gaya ❌"
            elif [ "$env_name" == "production" ]; then
                STATE="approved"
                COMMENT="Production is not allowed yet 🛑"
            fi
            # ------------------------------

            echo "Environment: $env_name -> Decision: $STATE"

            # 3. Decision bhejo
            curl -L -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/deployment_protection_rule" \
              -d "{
                \"environment_name\": \"$env_name\",
                \"state\": \"$STATE\",
                \"comment\": \"$COMMENT\"
              }"
          done