name: Approve Deployment via GitHub App

on:
  repository_dispatch:
    types: [approve-deployment]

jobs:
  approve:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Generate GitHub App Token (for Repo1)
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # 2️⃣ Install jq
      - run: sudo apt-get update && sudo apt-get install -y jq

      # 3️⃣ Read run_id from payload
      - name: Set Run ID
        id: run
        run: echo "run_id=${{ github.event.client_payload.run_id }}" >> $GITHUB_OUTPUT

      # 4️⃣ Wait for pending deployment (IMPORTANT 🔥)
      - name: Wait for pending deployment
        run: |
          RUN_ID=${{ steps.run.outputs.run_id }}
          TOKEN=${{ steps.app-token.outputs.token }}

          for i in {1..12}; do
            echo "Checking pending deployments... attempt $i"

            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/RajaNimit27/testGithubAppDeploymentRepo1/actions/runs/$RUN_ID/pending_deployments)

            COUNT=$(echo $RESPONSE | jq length)

            if [ "$COUNT" -gt 0 ]; then
              echo "Deployment ready ✅"
              break
            fi

            echo "Waiting ⏳"
            sleep 10
          done

      # 5️⃣ Get ENV_ID
      - name: Get Environment ID
        id: env
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            https://api.github.com/repos/RajaNimit27/testGithubAppDeploymentRepo1/environments)

          ENV_ID=$(echo $RESPONSE | jq '.environments[] | select(.name=="production") | .id')
          echo "env_id=$ENV_ID" >> $GITHUB_OUTPUT

      # 6️⃣ Approve Deployment
      - name: Approve Deployment
        run: |

            RUN_ID=${{ steps.run.outputs.run_id }}
            TOKEN=${{ secrets.GH_TOKEN }}

            # Get pending deployments
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/RajaNimit27/testGithubAppDeploymentRepo1/actions/runs/$RUN_ID/pending_deployments)

            echo "Pending deployments response:"
            echo $RESPONSE

            COUNT=$(echo $RESPONSE | jq length)

            if [ "$COUNT" -eq 0 ]; then
              echo "❌ No pending deployments found. Exiting."
              exit 1
            fi

            # Extract ENV IDs dynamically
            ENV_IDS=$(echo $RESPONSE | jq '[.[].environment.id]')

            echo "Approving environments: $ENV_IDS"

            # Approve
            curl -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/RajaNimit27/testGithubAppDeploymentRepo1/actions/runs/$RUN_ID/pending_deployments \
              -d "{
                \"environment_ids\": $ENV_IDS,
                \"state\": \"approved\",
                \"comment\": \"Approved via GitHub App 🚀\"
              }"

